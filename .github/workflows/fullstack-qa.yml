name: Full-stack QA

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: fullstack-qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fullstack-qa:
    name: Dev stand full-stack QA
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install backend deps + pytest
        run: pip install -r backend/requirements.txt pytest

      - name: Prepare dev stand env
        run: cp deploy/dev/remnawave-dev.env.example .env.remnawave-dev

      - name: Validate compose config
        run: npm run dev:stand:config

      - name: Start dev stand
        run: npm run dev:stand:up

      - name: Run full-stack QA
        env:
          QA_FULLSTACK: "1"
          QA_API_BASE_URL: http://127.0.0.1:8082
          QA_WEBHOOK_BASE_URL: http://127.0.0.1:8080
          QA_FRONTEND_URL: http://127.0.0.1:8082
          QA_REMNAWAVE_HEALTH_URL: http://127.0.0.1:3001/health
          QA_DB_DSN: postgresql://remnawave_minishop:remnawave_minishop@127.0.0.1:6768/remnawave_minishop
          QA_PAYMENT_SECRET: dev_qa_payment_secret_change_me
        run: npm run qa:fullstack

      - name: Capture compose logs
        if: ${{ failure() }}
        run: >-
          docker compose --env-file .env.remnawave-dev
          -f docker-compose-dev.yml
          -f docker-compose.remnawave-dev.yml
          --profile seed
          logs --no-color > fullstack-qa-compose.log || true

      - name: Upload compose logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: fullstack-qa-compose-logs
          path: fullstack-qa-compose.log
          retention-days: 7

      - name: Stop dev stand
        if: ${{ always() }}
        run: npm run dev:stand:down
