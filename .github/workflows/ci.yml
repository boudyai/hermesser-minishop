name: PR checks

# Runs on pull requests into main (typically from dev) and into dev (typically
# from feature/* branches): lint + format checks, a demo settings-manifest
# drift guard, and a no-push image build to prove the Docker images still build.

on:
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.8.0"

      - name: Ruff lint (Python)
        run: ruff check .

      - name: Ruff format check (Python)
        run: ruff format --check .

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: ESLint (frontend)
        run: npm run lint
        working-directory: frontend

      - name: Svelte typecheck
        run: npm run check:svelte
        working-directory: frontend

      - name: Check generated API types are in sync
        run: |
          npm run generate:api-types
          git diff --exit-code src/lib/api/openapi.generated.ts
        working-directory: frontend

      - name: Prettier check (frontend)
        run: npm run format:check
        working-directory: frontend

  demo-manifest:
    name: Demo settings manifest in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps + pytest
        run: pip install -r backend/requirements.txt pytest

      # Fails if admin_settings_manifest.py changed without regenerating the
      # demo snapshot. Fix: `python scripts/export_settings_manifest.py` then
      # `npx --prefix frontend prettier --write \
      #   src/lib/webapp/settingsManifest.generated.json`, and commit the result.
      - name: Check demo settings manifest is in sync
        run: python -m pytest tests/contracts/test_settings_manifest_demo_sync.py -q

  test:
    name: Python tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
          POSTGRES_DB: vpn_shop_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_user -d vpn_shop_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: vpn_shop_db
      REDIS_URL: redis://127.0.0.1:6379/0
      BOT_TOKEN: "1234567890:AA_secret_bot_token_value"
      ADMIN_IDS: "1"
      WEBAPP_SESSION_SECRET: "test-webapp-session-secret"
      WEBHOOK_SECRET_TOKEN: "test-webhook-secret"
      PANEL_API_URL: "https://panel.example.test"
      PANEL_API_KEY: "test-panel-api-key"
      PANEL_WEBHOOK_SECRET: "test-panel-webhook-secret"
      SUBSCRIPTION_MINI_APP_URL: "https://miniapp.example.test"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps + pytest
        run: pip install -r backend/requirements.txt pytest

      - name: Run full pytest suite
        run: python -m pytest -q

  typecheck:
    name: Python typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps + mypy
        run: pip install -r backend/requirements.txt "mypy>=1.15,<2"

      - name: Mypy web API and event layers
        run: >-
          python -m mypy
          backend/db
          backend/bot/infra
          backend/bot/middlewares
          backend/bot/utils
          backend/bot/plugins
          backend/bot/keyboards
          backend/bot/payment_providers
          backend/bot/services
          backend/bot/handlers
          backend/bot/app/factories
          backend/bot/app/controllers
          backend/bot/app/web

  build:
    name: Docker build
    uses: ./.github/workflows/_docker-build-push.yml
    with:
      push: false
      tag_mode: dev
