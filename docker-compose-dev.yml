services:
  postgres:
    image: postgres:17.6
    container_name: remnawave-minishop-postgres
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - remnawave-minishop-db-data:/var/lib/postgresql/data
    networks:
      - remnawave-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: remnawave-minishop-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - remnawave-minishop-redis-data:/data
    networks:
      - remnawave-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    container_name: remnawave-minishop-migrate
    image: 3252a8/remnawave-minishop-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: backend
    command: ["python", "backend/main_migrate.py"]
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      IMAGE_TAG: ${IMAGE_TAG:-latest}
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data:rw
    networks:
      - remnawave-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    container_name: remnawave-minishop-backend
    image: 3252a8/remnawave-minishop-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: backend
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      IMAGE_TAG: ${IMAGE_TAG:-latest}
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      WEBAPP_ENABLED: "true"
    volumes:
      - ./data:/app/data:rw
      - ${COMPOSE_BACKUP_SOURCE:-.}:/app/compose-source:${COMPOSE_RESTORE_MODE:-rw}
    networks:
      - remnawave-network
    ports:
      - "127.0.0.1:${WEB_SERVER_PORT:-8080}:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    container_name: remnawave-minishop-worker
    image: 3252a8/remnawave-minishop-worker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: worker
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      IMAGE_TAG: ${IMAGE_TAG:-latest}
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data:rw
    networks:
      - remnawave-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    container_name: remnawave-minishop-frontend
    image: 3252a8/remnawave-minishop-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: frontend
    networks:
      - remnawave-network
    environment:
      IMAGE_TAG: ${IMAGE_TAG:-latest}
      FRONTEND_PORT: ${FRONTEND_PORT:-8082}
      FRONTEND_PUBLIC: 127.0.0.1:${FRONTEND_PORT:-8082}->80
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8082}:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 5

  newt:
    image: fosrl/newt
    container_name: remnawave-minishop-newt
    restart: unless-stopped
    environment:
      - PANGOLIN_ENDPOINT=https://app.pangolin.net
      - NEWT_ID=${NEWT_ID:?Set NEWT_ID in .env}
      - NEWT_SECRET=${NEWT_SECRET:?Set NEWT_SECRET in .env}
      - PING_INTERVAL=30s
      - PING_TIMEOUT=20s
    networks:
      - remnawave-network

networks:
  remnawave-network:

volumes:
  remnawave-minishop-db-data:
    name: remnawave-minishop-db-data
  remnawave-minishop-redis-data:
    name: remnawave-minishop-redis-data
