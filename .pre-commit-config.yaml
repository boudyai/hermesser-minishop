repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: frontend-prettier
        name: frontend prettier
        entry: npm --prefix frontend run format
        language: system
        files: ^frontend/(src/.*\.(js|ts|svelte)|scripts/.*\.mjs)$
        pass_filenames: false
