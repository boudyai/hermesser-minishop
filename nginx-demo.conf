server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # The standalone mock app does client-side routing under /demo/runtime/.
    # Serve real files when they exist, otherwise fall back to the app shell
    # so a refresh on an in-app route still boots the SPA.
    location / {
        try_files $uri $uri/ /demo/runtime/app/index.html;
    }
}
