[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    ".git",
    ".pytest_cache",
    "__pycache__",
    "node_modules",
    "backend/bot/app/web/templates",
]

[tool.ruff.lint]
select = [
    "E", # pycodestyle errors
    "F", # pyflakes
    "I", # isort
]
ignore = [
    "E731", # lambda assignment (common in handlers)
    "E712", # `== True` / `== False` in SQLAlchemy filters
    "E711", # `== None` on ORM columns (use `.is_(None)` in refactors)
]

[tool.ruff.lint.isort]
known-first-party = ["app_logging", "bot", "config", "db", "tests"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_configs = true

[tool.coverage.run]
source = ["backend"]
omit = [
    "backend/scripts/import_legacy.py",
    "scripts/import_legacy.py",
    "*/__pycache__/*",
]

[tool.coverage.report]
show_missing = true

[[tool.mypy.overrides]]
module = "db.*"
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = [
    "bot.app.factories.*",
    "bot.middlewares.*",
    "bot.utils.*",
    "bot.infra.*",
    "bot.plugins.*",
    "bot.keyboards.*",
    "bot.services.*",
    "bot.payment_providers.*",
    "bot.handlers.*",
    "bot.app.web.*",
    "web.http_contracts",
    "web.route_contracts",
    "web.openapi",
]
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_return_any = true
no_implicit_optional = true
